version: "3.9"

networks:
  neuralops-network:
    driver: bridge

volumes:
  postgres_data:
  timescaledb_data:
  redis_data:
  kafka_data:
  zookeeper_data:
  zookeeper_log:
  prometheus_data:
  grafana_data:
  ollama_data:

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: neuralops-zookeeper
    hostname: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    networks:
      - neuralops-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: neuralops-kafka
    hostname: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 72
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - neuralops-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: neuralops-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - neuralops-network
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      echo 'Creating Kafka topics...'
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic neuralops.traces.raw --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic neuralops.traces.errors --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic neuralops.anomalies --partitions 3 --replication-factor 1
      echo 'Kafka topics created.'
      kafka-topics --bootstrap-server kafka:29092 --list
      "
    restart: on-failure

  postgres:
    image: postgres:16-alpine
    container_name: neuralops-postgres
    hostname: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-neuralops}
      POSTGRES_USER: ${POSTGRES_USER:-neuralops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-neuralops_dev_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks:
      - neuralops-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-neuralops} -d ${POSTGRES_DB:-neuralops}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: neuralops-timescaledb
    hostname: timescaledb
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${TIMESCALE_DB:-neuralops_metrics}
      POSTGRES_USER: ${TIMESCALE_USER:-neuralops}
      POSTGRES_PASSWORD: ${TIMESCALE_PASSWORD:-neuralops_dev_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./infrastructure/docker/timescaledb-init.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks:
      - neuralops-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TIMESCALE_USER:-neuralops} -d ${TIMESCALE_DB:-neuralops_metrics}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: neuralops-redis
    hostname: redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    networks:
      - neuralops-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: neuralops-prometheus
    hostname: prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    volumes:
      - ./infrastructure/docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - neuralops-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s

  grafana:
    image: grafana/grafana:10.2.0
    container_name: neuralops-grafana
    hostname: grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_DOMAIN: localhost
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/docker/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - neuralops-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s

  ollama:
    image: ollama/ollama
    container_name: neuralops-ollama
    hostname: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - neuralops-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Application services ──────────────────────────────────────────────────

  gateway:
    build:
      context: services
      dockerfile: gateway/Dockerfile
    container_name: neuralops-gateway
    hostname: gateway
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: "8080"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      TRACE_INGESTION_URI: http://trace-ingestion-service:8081
      METRICS_SERVICE_URI: http://metrics-service:8082
      ALERT_SERVICE_URI: http://alert-service:8083
      COST_ANALYTICS_URI: http://cost-analytics-service:8084
      USER_SERVICE_URI: http://user-service:8085
      AI_ANALYSIS_URI: http://ai-analysis-service:8090
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - neuralops-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

  trace-ingestion-service:
    build:
      context: services
      dockerfile: trace-ingestion-service/Dockerfile
    container_name: neuralops-trace-ingestion
    hostname: trace-ingestion-service
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: "8081"
      POSTGRES_URL: jdbc:postgresql://postgres:5432/neuralops
      POSTGRES_USER: ${POSTGRES_USER:-neuralops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-neuralops_dev_password}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_TRACES_RAW: neuralops.traces.raw
      KAFKA_TOPIC_TRACES_ERRORS: neuralops.traces.errors
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - neuralops-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8081/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  metrics-service:
    build:
      context: services
      dockerfile: metrics-service/Dockerfile
    container_name: neuralops-metrics
    hostname: metrics-service
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: "8082"
      TIMESCALE_URL: jdbc:postgresql://timescaledb:5432/neuralops_metrics
      TIMESCALE_USER: ${TIMESCALE_USER:-neuralops}
      TIMESCALE_PASSWORD: ${TIMESCALE_PASSWORD:-neuralops_dev_password}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_TRACES_RAW: neuralops.traces.raw
      KAFKA_CONSUMER_GROUP: neuralops-metrics-service
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - neuralops-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8082/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  alert-service:
    build:
      context: services
      dockerfile: alert-service/Dockerfile
    container_name: neuralops-alert
    hostname: alert-service
    ports:
      - "8083:8083"
    environment:
      SERVER_PORT: "8083"
      POSTGRES_URL: jdbc:postgresql://postgres:5432/neuralops
      POSTGRES_USER: ${POSTGRES_USER:-neuralops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-neuralops_dev_password}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_TRACES_RAW: neuralops.traces.raw
      KAFKA_TOPIC_ANOMALIES: neuralops.anomalies
      KAFKA_CONSUMER_GROUP: neuralops-alert-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - neuralops-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8083/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  cost-analytics-service:
    build:
      context: services
      dockerfile: cost-analytics-service/Dockerfile
    container_name: neuralops-cost-analytics
    hostname: cost-analytics-service
    ports:
      - "8084:8084"
    environment:
      SERVER_PORT: "8084"
      POSTGRES_URL: jdbc:postgresql://postgres:5432/neuralops
      POSTGRES_USER: ${POSTGRES_USER:-neuralops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-neuralops_dev_password}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_TRACES_RAW: neuralops.traces.raw
      KAFKA_CONSUMER_GROUP: neuralops-cost-analytics
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - neuralops-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8084/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  user-service:
    build:
      context: services
      dockerfile: user-service/Dockerfile
    container_name: neuralops-user
    hostname: user-service
    ports:
      - "8085:8085"
    environment:
      SERVER_PORT: "8085"
      POSTGRES_URL: jdbc:postgresql://postgres:5432/neuralops
      POSTGRES_USER: ${POSTGRES_USER:-neuralops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-neuralops_dev_password}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-secure-256-bit-secret-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - neuralops-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8085/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  ai-analysis-service:
    build:
      context: services/ai-analysis-service
    container_name: neuralops-ai-analysis
    hostname: ai-analysis-service
    ports:
      - "8090:8090"
    environment:
      SERVER_PORT: "8090"
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_TRACES_RAW: neuralops.traces.raw
      KAFKA_TOPIC_ANOMALIES: neuralops.anomalies
      KAFKA_CONSUMER_GROUP: neuralops-ai-analysis
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      kafka:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - neuralops-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8090/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: frontend
    container_name: neuralops-frontend
    hostname: frontend
    ports:
      - "3000:80"
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - neuralops-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
