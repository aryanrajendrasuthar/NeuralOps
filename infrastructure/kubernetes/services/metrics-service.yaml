apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-service
  namespace: neuralops
  labels:
    app: metrics-service
    app.kubernetes.io/part-of: neuralops
spec:
  replicas: 3
  selector:
    matchLabels:
      app: metrics-service
  template:
    metadata:
      labels:
        app: metrics-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8082"
    spec:
      containers:
        - name: metrics-service
          image: neuralops/metrics-service:latest
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: neuralops-config
            - secretRef:
                name: neuralops-secrets
          env:
            - name: SERVER_PORT
              value: "8082"
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 25
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 45
            periodSeconds: 20
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: metrics-service
  namespace: neuralops
spec:
  selector:
    app: metrics-service
  ports:
    - port: 8082
      targetPort: 8082
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: metrics-service-hpa
  namespace: neuralops
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: metrics-service
  minReplicas: 3
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
