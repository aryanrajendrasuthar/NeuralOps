apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-analysis-service
  namespace: neuralops
  labels:
    app: ai-analysis-service
    app.kubernetes.io/part-of: neuralops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-analysis-service
  template:
    metadata:
      labels:
        app: ai-analysis-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8090"
    spec:
      containers:
        - name: ai-analysis-service
          image: neuralops/ai-analysis-service:latest
          ports:
            - containerPort: 8090
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: neuralops-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: KAFKA_TOPIC_TRACES_RAW
              valueFrom:
                configMapKeyRef:
                  name: neuralops-config
                  key: KAFKA_TOPIC_TRACES_RAW
            - name: KAFKA_TOPIC_ANOMALIES
              valueFrom:
                configMapKeyRef:
                  name: neuralops-config
                  key: KAFKA_TOPIC_ANOMALIES
            - name: OLLAMA_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: neuralops-config
                  key: OLLAMA_BASE_URL
            - name: KAFKA_CONSUMER_GROUP
              value: "neuralops-ai-analysis"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: ai-analysis-service
  namespace: neuralops
spec:
  selector:
    app: ai-analysis-service
  ports:
    - port: 8090
      targetPort: 8090
  type: ClusterIP
