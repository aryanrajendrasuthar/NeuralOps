global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: neuralops-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8080
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: gateway

  - job_name: neuralops-trace-ingestion
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8081
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: trace-ingestion

  - job_name: neuralops-metrics-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8082
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: metrics-service

  - job_name: neuralops-alert-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8083
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: alert-service

  - job_name: neuralops-cost-analytics
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8084
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: cost-analytics

  - job_name: neuralops-user-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8085
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: user-service

  - job_name: neuralops-ai-analysis
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:8090
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: ai-analysis
