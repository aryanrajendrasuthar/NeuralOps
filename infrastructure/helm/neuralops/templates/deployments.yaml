{{- $services := list
  (dict "name" "gateway"              "imageName" "gateway"               "port" .Values.services.gateway.port       "config" .Values.services.gateway)
  (dict "name" "trace-ingestion-service" "imageName" "trace-ingestion-service" "port" .Values.services.traceIngestion.port "config" .Values.services.traceIngestion)
  (dict "name" "metrics-service"      "imageName" "metrics-service"        "port" .Values.services.metricsService.port "config" .Values.services.metricsService)
  (dict "name" "alert-service"        "imageName" "alert-service"          "port" .Values.services.alertService.port  "config" .Values.services.alertService)
  (dict "name" "cost-analytics-service" "imageName" "cost-analytics-service" "port" .Values.services.costAnalytics.port "config" .Values.services.costAnalytics)
  (dict "name" "user-service"         "imageName" "user-service"           "port" .Values.services.userService.port   "config" .Values.services.userService)
-}}
{{- range $svc := $services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $svc.name }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    app: {{ $svc.name }}
    app.kubernetes.io/part-of: neuralops
spec:
  replicas: {{ $svc.config.replicaCount }}
  selector:
    matchLabels:
      app: {{ $svc.name }}
  template:
    metadata:
      labels:
        app: {{ $svc.name }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: {{ $svc.port | quote }}
    spec:
      containers:
        - name: {{ $svc.name }}
          image: {{ include "neuralops.image" (dict "registry" $.Values.global.imageRegistry "name" $svc.imageName "tag" $.Values.image.tag) }}
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ $svc.port }}
          envFrom:
            - configMapRef:
                name: neuralops-config
            - secretRef:
                name: neuralops-secrets
          env:
            - name: SERVER_PORT
              value: {{ $svc.port | quote }}
          resources:
            {{- toYaml $svc.config.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: {{ $svc.port }}
            initialDelaySeconds: 25
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: {{ $svc.port }}
            initialDelaySeconds: 45
            periodSeconds: 20
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $svc.name }}
  namespace: {{ $.Values.global.namespace }}
spec:
  selector:
    app: {{ $svc.name }}
  ports:
    - port: {{ $svc.port }}
      targetPort: {{ $svc.port }}
  type: ClusterIP
{{- if $svc.config.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $svc.name }}-hpa
  namespace: {{ $.Values.global.namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $svc.name }}
  minReplicas: {{ $svc.config.autoscaling.minReplicas }}
  maxReplicas: {{ $svc.config.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $svc.config.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
{{- end }}
