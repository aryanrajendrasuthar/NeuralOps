apiVersion: v1
kind: Secret
metadata:
  name: neuralops-secrets
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "neuralops.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.postgres.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
  TIMESCALE_USER: {{ .Values.timescale.user | quote }}
  TIMESCALE_PASSWORD: {{ .Values.timescale.password | quote }}
  REDIS_PASSWORD: {{ .Values.redis.password | quote }}
  JWT_SECRET: {{ .Values.jwt.secret | quote }}
