server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: neuralops-metrics-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${TIMESCALE_URL:jdbc:postgresql://localhost:5433/neuralops_metrics}
    username: ${TIMESCALE_USER:neuralops}
    password: ${TIMESCALE_PASSWORD:neuralops_dev_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
      connection-timeout: 30000
      pool-name: MetricsTimescalePool
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:neuralops-metrics-service}
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.neuralops.*
        isolation.level: read_committed
        max.poll.records: 500
        fetch.min.bytes: 1
        fetch.max.wait.ms: 500
    listener:
      ack-mode: MANUAL_IMMEDIATE
      concurrency: ${KAFKA_LISTENER_CONCURRENCY:3}

neuralops:
  kafka:
    topics:
      traces-raw: ${KAFKA_TOPIC_TRACES_RAW:neuralops.traces.raw}
  metrics:
    flush-interval-ms: ${METRICS_FLUSH_INTERVAL_MS:500}
    redis-ttl-seconds: ${METRICS_REDIS_TTL_SECONDS:86400}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      service: neuralops-metrics-service
      version: 1.0.0

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

resilience4j:
  circuitbreaker:
    instances:
      redis:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s
      timescaledb:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.neuralops: ${APP_LOG_LEVEL:DEBUG}
