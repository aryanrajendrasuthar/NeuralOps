server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: neuralops-alert-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/neuralops}
    username: ${POSTGRES_USER:neuralops}
    password: ${POSTGRES_PASSWORD:neuralops_dev_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
      pool-name: AlertServicePool
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:neuralops-alert-service}
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.neuralops.*
        isolation.level: read_committed
        max.poll.records: 100
    listener:
      ack-mode: MANUAL_IMMEDIATE
      concurrency: ${KAFKA_LISTENER_CONCURRENCY:3}

neuralops:
  kafka:
    topics:
      traces-raw: ${KAFKA_TOPIC_TRACES_RAW:neuralops.traces.raw}
      anomalies: ${KAFKA_TOPIC_ANOMALIES:neuralops.anomalies}
  alerting:
    deduplication-window-seconds: ${ALERT_DEDUP_WINDOW_SECONDS:300}
    webhook-timeout-seconds: ${WEBHOOK_TIMEOUT_SECONDS:10}
    webhook-max-retries: ${WEBHOOK_MAX_RETRIES:3}
    thresholds:
      latency-ms: ${ALERT_LATENCY_THRESHOLD_MS:2000}
      error-rate-percent: ${ALERT_ERROR_RATE_THRESHOLD:5.0}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      service: neuralops-alert-service
      version: 1.0.0

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.neuralops: ${APP_LOG_LEVEL:DEBUG}
