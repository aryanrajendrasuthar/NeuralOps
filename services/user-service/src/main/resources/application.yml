server:
  port: ${SERVER_PORT:8085}

spring:
  application:
    name: neuralops-user-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/neuralops}
    username: ${POSTGRES_USER:neuralops}
    password: ${POSTGRES_PASSWORD:neuralops_dev_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
      pool-name: UserServicePool
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

neuralops:
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-secure-256-bit-secret-in-production}
    access-token-expiry-minutes: ${JWT_ACCESS_EXPIRY_MINUTES:15}
    refresh-token-expiry-days: ${JWT_REFRESH_EXPIRY_DAYS:30}
  api-key:
    prefix: nops_
    hash-rounds: ${API_KEY_HASH_ROUNDS:10}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      service: neuralops-user-service
      version: 1.0.0

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.neuralops: ${APP_LOG_LEVEL:DEBUG}
    org.springframework.security: WARN
