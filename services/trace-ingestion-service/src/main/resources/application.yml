server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: neuralops-trace-ingestion
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/neuralops}
    username: ${POSTGRES_USER:neuralops}
    password: ${POSTGRES_PASSWORD:neuralops_dev_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: TraceIngestionPool
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      retry-backoff-ms: 1000
      linger-ms: 5
      batch-size: 65536
      buffer-memory: 33554432
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        spring.json.add.type.headers: false

neuralops:
  kafka:
    topics:
      traces-raw: ${KAFKA_TOPIC_TRACES_RAW:neuralops.traces.raw}
      traces-errors: ${KAFKA_TOPIC_TRACES_ERRORS:neuralops.traces.errors}
  ingestion:
    max-payload-size-bytes: ${MAX_PAYLOAD_BYTES:65536}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      service: neuralops-trace-ingestion
      version: 1.0.0

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
  info:
    title: NeuralOps Trace Ingestion API
    version: 1.0.0
    description: Receives and validates trace events from AI agents

resilience4j:
  circuitbreaker:
    instances:
      kafka-producer:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
      database:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.neuralops: ${APP_LOG_LEVEL:DEBUG}
